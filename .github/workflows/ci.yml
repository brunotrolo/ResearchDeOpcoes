name: CI

# Roda os testes a cada push na main e em todo Pull Request.
# Não usa segredos: os testes operam sobre DataFrames sintéticos (sem rede/planilha).

env:
  # Opta pelo Node 24 já agora (silencia o aviso de depreciação do Node 20).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes (pytest)
        run: python -m pytest -q
