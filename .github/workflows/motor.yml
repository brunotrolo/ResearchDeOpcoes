name: Motor (Escudo + Radar)

# Roda o motor na nuvem do GitHub — sem depender do Dell.
#   - SEM agendamento automático: a execução é só MANUAL (workflow_dispatch).
#     Rode pelo site do GitHub (abre no celular): aba Actions > Motor > Run workflow.
#     Opções: "normal" (respeita o pregão — encerra fora de 10:00–16:30/seg–sex),
#     "homologar" (IGNORA o horário e roda TUDO — use p/ rodar a QUALQUER momento),
#     "email_teste" (só um e-mail de teste).
#
# Segredos necessários (Settings > Secrets and variables > Actions):
#   OPLAB_TOKEN, SPREADSHEET_ID, GOOGLE_CREDENTIALS_JSON (conteúdo do JSON),
#   EMAIL_USER, EMAIL_APP_PASSWORD, ALERT_RECIPIENTS

env:
  # Opta pelo Node 24 já agora — silencia o aviso de depreciação do Node 20
  # (vira padrão em 16/06/2026). Recomendado pelo próprio aviso do GitHub.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  # SEM agendamento (schedule) — execução SÓ MANUAL, pelo site do GitHub.
  workflow_dispatch:
    inputs:
      acao:
        description: "O que fazer?"
        type: choice
        default: normal
        options:
          - normal       # respeita o pregão (encerra se mercado fechado)
          - homologar    # IGNORA mercado fechado e roda TUDO de verdade (LOGS + e-mails)
          - email_teste  # só manda um e-mail de teste (prova que o pager funciona)

concurrency:
  group: motor          # evita execuções sobrepostas (substitui o lock-file)
  cancel-in-progress: false

jobs:
  rodar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Persiste o estado (dedupe de alertas) entre execuções, já que cada run
      # do Actions começa "do zero". restore-keys pega o estado mais recente.
      - name: Restaurar estado
        uses: actions/cache/restore@v4
        with:
          path: state
          key: motor-state-${{ github.run_id }}
          restore-keys: motor-state-

      - name: Escrever credenciais.json a partir do segredo
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credenciais.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Rodar o motor
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          OPLAB_TOKEN: ${{ secrets.OPLAB_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
          EMAIL_SENDER: ${{ secrets.EMAIL_USER }}
          GOOGLE_CREDENTIALS_FILE: credenciais.json
          MARKET_TZ: America/Sao_Paulo
          DRY_RUN: "false"
          # homologar/email_teste ignoram o mercado fechado (rodam num domingo).
          FORCE_RUN: ${{ (inputs.acao == 'homologar' || inputs.acao == 'email_teste') && 'true' || 'false' }}
          EMAIL_TEST_ONLY: ${{ inputs.acao == 'email_teste' && 'true' || 'false' }}
        run: |
          mkdir -p state logs
          python main.py

      - name: Salvar estado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: motor-state-${{ github.run_id }}

      - name: Remover credenciais do runner
        if: always()
        run: rm -f credenciais.json
